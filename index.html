<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Perguntas</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin-top:80px;
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:6px;
background:#ff4d6d;
color:white;
font-size:16px;
}
</style>
</head>

<body>

<h2 id="texto"></h2>
<div id="opcoes"></div>

<script>

const historia = {

inicio:{
texto:"Posso te fazer algumas perguntas?",
opcoes:[
{texto:"Claro", destino:"pergunta1"},
{texto:"Depende...", destino:"curioso"}
]
},

curioso:{
texto:"Então vamos ver se você continua curioso.",
opcoes:[
{texto:"Ok", destino:"pergunta1"},
{texto:"Agora fiquei interessado", destino:"pergunta1"}
]
},

pergunta1:{
texto:"Você acredita que pequenas coisas podem mudar o dia de alguém?",
opcoes:[
{texto:"Sim", destino:"esperanca"},
{texto:"Não muito", destino:"ceticismo"}
]
},

esperanca:{
texto:"Isso é bom. Pessoas assim costumam perceber sentimentos escondidos.",
opcoes:[
{texto:"Que tipo de sentimentos?", destino:"pergunta2"},
{texto:"Interessante...", destino:"pergunta2"}
]
},

ceticismo:{
texto:"Talvez você só não tenha encontrado a pessoa certa ainda.",
opcoes:[
{texto:"Talvez", destino:"pergunta2"},
{texto:"Quem sabe", destino:"pergunta2"}
]
},

pergunta2:{
texto:"Se alguém estivesse pensando em você agora, o que você sentiria?",
opcoes:[
{texto:"Ficaria feliz", destino:"finalamor"},
{texto:"Depende de quem", destino:"finalcurioso"}
]
},

finalamor:{
texto:"Então espero que isso te faça sorrir um pouco... Eu te amo ❤️",
opcoes:[]
},

finalcurioso:{
texto:"Então talvez você devesse descobrir quem estava pensando em você... Eu te amo ❤️",
opcoes:[]
}

}

let atual="inicio"

function mostrarCena(){

const cena = historia[atual]

document.getElementById("texto").innerText=cena.texto

let html=""

cena.opcoes.forEach(op=>{
html+=`<button onclick="escolher('${op.destino}')">${op.texto}</button>`
})

document.getElementById("opcoes").innerHTML=html

}

function escolher(destino){
atual=destino
mostrarCena()
}

mostrarCena()

</script>

</body>
</html>
