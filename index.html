<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pra tu Sneijder, aham</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0c1024;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;

}

/* fundo */

#fundo{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
pointer-events:none;

}

/* personagens GIF */

.personagem{

position:absolute;
width:110px;
opacity:0.9;
animation:flutuar 6s ease-in-out infinite;

}

.p1{left:5%; bottom:5%;}
.p2{right:5%; bottom:10%;}
.p3{left:40%; top:5%;}

@keyframes flutuar{

0%{transform:translateY(0px);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0px);}

}

/* caixa principal */

#jogo{

background:rgba(20,22,50,0.85);
backdrop-filter:blur(10px);
padding:30px;
border-radius:20px;
width:90%;
max-width:520px;
box-shadow:0 0 40px rgba(0,0,0,0.6);
text-align:center;

}

/* texto */

#texto{

font-size:20px;
margin-bottom:25px;
line-height:1.4;

}

/* botões */

button{

display:block;
width:100%;
margin:10px 0;
padding:12px;
border:none;
border-radius:12px;
background:#6c7cff;
color:white;
font-size:16px;
cursor:pointer;
transition:0.2s;

}

button:hover{

background:#8c98ff;
transform:scale(1.05);

}

/* vídeo */

iframe{

border:none;
border-radius:12px;
margin-top:15px;

}

</style>

</head>

<body>

<div id="fundo">

<img src="img/chiikawa1.gif" class="personagem p1">
<img src="img/momonga1.gif" class="personagem p2">
<img src="img/usagi1.gif" class="personagem p3">

</div>

<div id="jogo">

<div id="texto"></div>
<div id="opcoes"></div>

</div>

<script>

/* HISTÓRIA */

const historia={

inicio:{
texto:"Aoba Sneijder Araújooo, isso aí meu. Fiz esse troço de péssima qualidade pra ver o que tu iria achar desse coiso. Tecnicamente eu ia te mandar isso aqui no teu próximo aniversário, mas achei melhor agora.",
opcoes:[
{texto:"Hm..",destino:"p1"},
{texto:"Fala logo Jacka Torta lixoo",destino:"p1"}
]
},

p1:{
texto:"Você tá bem?",
opcoes:[
{texto:"Aham",destino:"dia"},
{texto:"Sei lá",destino:"noite"}
]
},

dia:{
texto:"Claramente não tá, sempre fala isso porque acha que se for sincera, ou irão te julgar, ou irão pensar que é brincadeira, já que nem é sempre que você demonstra que não está bem.",
opcoes:[
{texto:"Tanto faz",destino:"p2"}
]
},

noite:{
texto:"Não seja grosseira, não foi assim que te ensinei >:(",
opcoes:[
{texto:"Aham, sei",destino:"p2"}
]
},

p2:{
texto:"Você uma vez disse em seus Status que não sabia o que faria da vida no futuro, por enquanto. Mas eu tenho umas ideias",
opcoes:[
{texto:"Ideias?",destino:"explorar"},
{texto:"Fala logooo seu lixo",destino:"casa"}
]
},

explorar:{
texto:"Sim sim, supondo que daria certo, provavelmente demoraria anos e tudo dependeria da sorte. Vem morar comigo na minha futura casa :)",
opcoes:[
{texto:"Ixii, Elliot e Little Candy 2.0??!!",destino:"p3"}
]
},

casa:{
texto:"Calmaaaa safada, vem morar na minha futura casa comigo",
opcoes:[
{texto:"Oxii, papo de Elliot e Little Candy",destino:"p3"}
]
},

p3:{
texto:"Não me compare com eles, sou totalmente diferente >:(",
opcoes:[
{texto:"Mas por que você quer isso?",destino:"gato"},
{texto:"Cê tá falando sério ou tá brincando?",destino:"cachorro"},
{texto:"Vou desenhar rule",destino:"ambos"}
]
},

gato:{
texto:"Porque você não sabe o que fará da vida e não sei se darei conta de ficar sozinho. Eu poderia cuidar de você até que você soubesse o que fazer, assim você poderia ser independente e seguir sem mim nesse tempo :D",
opcoes:[
{texto:"Hm.. Sei não",destino:"p4"}
]
},

cachorro:{
texto:"Daqui a 5 anos te conto se é sério ;)",
opcoes:[
{texto:"Ah não, morree",destino:"p4"}
]
},

ambos:{
texto:"Ah véi, fugindo do assunto quando você não sabe o que responder, típico vindo de você",
opcoes:[
{texto:"Rudie lindo, goxtosuu",destino:"p4"}
]
},

p4:{
texto:"Deixa quieto, finge que nunca falei isso",
opcoes:[
{texto:"Mas por que isso do nada?",destino:"curioso"},
{texto:"Traduz",destino:"curioso"}
]
},

curioso:{
texto:"Bem, sou um idiota mesmo, eu apenas queria que você fosse de fato feliz para sempre, uma felicidade verdadeira, não algo passageiro e momentâneo. Eu só queria tentar te animar um pouco ou fazer algo diferente que ninguém nunca fez pra você, mesmo que eu não seja perfeito, mas quero acreditar que no fundo você é feliz e sempre será, já que você tem pessoas que te apoiarão com toda certeza.",
opcoes:[
{texto:"Onde cê quer chegar com isso? Pra quê isso tudo?",destino:"final1"}
]
},

final1:{
texto:"Eh.. mesmo que eu não seja tão divertido e ando meio fechado. Eu realmente gosto de tu e tenho um grande apego por você. Muito obrigado por ter ficado comigo até nos meus momentos quando eu sumi, obrigado por ter me dado muitas coisas que nunca mereci como afeto e carinho mesmo que indireto. Eu queria um dia poder te retribuir o suficiente. Obrigado por ter entrado em minha vida, Sneijder.",
opcoes:[
{texto:"Hm.. Mais alguma coisa?",destino:"final2"}
]
},

final2:{
texto:"Eu te amo.",
opcoes:[
{texto:"...",destino:"video"}
]
},

video:{
texto:"🦖🐚💃👾",
video:true
}

}

/* MOTOR */

let atual="inicio"

function mostrarCena(){

const cena=historia[atual]

document.getElementById("texto").innerText=cena.texto

const opcoesDiv=document.getElementById("opcoes")
opcoesDiv.innerHTML=""

if(cena.video){

opcoesDiv.innerHTML=`
<iframe width="100%" height="280"
src="https://streamable.com/e/wlmj4r"
allowfullscreen>
</iframe>
`

return
}

cena.opcoes.forEach(opcao=>{

const botao=document.createElement("button")

botao.innerText=opcao.texto

botao.onclick=()=>{

atual=opcao.destino
mostrarCena()

}

opcoesDiv.appendChild(botao)

})

}

mostrarCena()

</script>

</body>
</html>
