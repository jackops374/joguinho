<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perguntas aham</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(270deg,#ffd6e7,#d6e8ff,#e8ffd6);
background-size:600% 600%;
animation:fundo 20s infinite;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

@keyframes fundo{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

#jogo{
background:white;
padding:30px;
border-radius:20px;
width:90%;
max-width:500px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
text-align:center;
animation:aparecer 0.6s;
}

@keyframes aparecer{
from{opacity:0; transform:scale(0.9);}
to{opacity:1; transform:scale(1);}
}

#texto{
font-size:20px;
margin-bottom:25px;
}

button{
display:block;
width:100%;
margin:10px 0;
padding:12px;
border:none;
border-radius:12px;
background:#6fa8ff;
color:white;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
background:#4a8cff;
}

iframe{
margin-top:20px;
border-radius:12px;
}

</style>
</head>

<body>

<div id="jogo">

<div id="texto"></div>

<div id="opcoes"></div>

</div>

<script>

const historia = {

inicio:{
texto:"Aoba Sneijder, fiz esse humilde coiso de coisas coisas.. sei lá, só leia os coisos e responde o que tu achar melhor",
opcoes:[
{texto:"Claro!",destino:"pergunta1"},
{texto:"Hmm... ok",destino:"pergunta1"}
]
},

pergunta1:{
texto:"Primeira pergunta: você prefere dia ou noite?",
opcoes:[
{texto:"Dia",destino:"dia1"},
{texto:"Noite",destino:"noite1"}
]
},

dia1:{
texto:"O dia tem algo animador. Parece que tudo pode acontecer.",
opcoes:[
{texto:"Verdade",destino:"pergunta2"}
]
},

noite1:{
texto:"A noite é calma. Dá pra pensar em muitas coisas.",
opcoes:[
{texto:"Continuar",destino:"pergunta2"}
]
},

pergunta2:{
texto:"Agora outra pergunta: você gosta de jogos?",
opcoes:[
{texto:"Sim",destino:"jogo1"},
{texto:"Mais ou menos",destino:"jogo2"},
{texto:"Muito!",destino:"jogo3"}
]
},

jogo1:{
texto:"Legal! Jogos são um jeito divertido de passar o tempo.",
opcoes:[
{texto:"Continuar",destino:"pergunta3"}
]
},

jogo2:{
texto:"Tudo bem. Nem todo mundo joga sempre.",
opcoes:[
{texto:"Continuar",destino:"pergunta3"}
]
},

jogo3:{
texto:"Então você provavelmente entende esse tipo de jogo.",
opcoes:[
{texto:"Continuar",destino:"pergunta3"}
]
},

pergunta3:{
texto:"Se pudesse visitar um lugar agora, qual seria?",
opcoes:[
{texto:"Praia",destino:"praia"},
{texto:"Montanha",destino:"montanha"},
{texto:"Floresta",destino:"floresta"}
]
},

praia:{
texto:"A praia é relaxante. Som das ondas e vento.",
opcoes:[
{texto:"Continuar",destino:"pergunta4"}
]
},

montanha:{

opcoes:[
{texto:"Continuar",destino:"pergunta4"}
]
},

floresta:{

opcoes:[
{texto:"Continuar",destino:"pergunta4"}
]
},

pergunta4:{
texto:"Você prefere conversar muito ou observar mais?",
opcoes:[
{texto:"Conversar",destino:"conv"},
{texto:"Observar",destino:"obs"}
]
},

conv:{
texto:"Conversar é uma boa forma de conhecer alguém.",
opcoes:[
{texto:"Continuar",destino:"pergunta5"}
]
},

obs:{
texto:"Observar também diz muito sobre as pessoas.",
opcoes:[
{texto:"Continuar",destino:"pergunta5"}
]
},

pergunta5:{
texto:"Agora uma pergunta aleatória: você prefere gatos ou cachorros?",
opcoes:[
{texto:"Gatos",destino:"gato"},
{texto:"Cachorros",destino:"cachorro"},
{texto:"Os dois",destino:"ambos"}
]
},

gato:{
texto:"Gatos têm um jeito curioso e tranquilo.",
opcoes:[
{texto:"Continuar",destino:"pergunta6"}

cachorro:{

pergunta6:{

]

curioso:{

opcoes:[

]
},

final1:{
texto:"Mas também queria dizer algo simples.",
opcoes:[
{texto:"O que?",destino:"final2"}
]
},

final2:{

{texto:"Ver surpresa",destino:"video"}
]
},

video:{
texto:"Aqui está uma pequena surpresa:",
video:true
}

}

let atual="inicio"

function mostrarCena(){

const cena=historia[atual]

document.getElementById("texto").innerText=cena.texto

const opcoesDiv=document.getElementById("opcoes")
opcoesDiv.innerHTML=""

if(cena.video){

opcoesDiv.innerHTML=`

<iframe width="100%" height="280"
src="https://streamable.com/e/wlmj4r"
allowfullscreen>
</iframe>

`

return
}

cena.opcoes.forEach(opcao=>{

const botao=document.createElement("button")

botao.innerText=opcao.texto

botao.onclick=()=>{
atual=opcao.destino
mostrarCena()
}

opcoesDiv.appendChild(botao)

})

}

mostrarCena()

</script>

</body>
</html>
