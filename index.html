```html
<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perguntas aham</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f1226;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;

}

/* fundo animado */

.fundo{

position:fixed;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;

}

/* bolhas */

.bolha{

position:absolute;
bottom:-100px;
width:20px;
height:20px;
background:rgba(255,255,255,0.1);
border-radius:50%;
animation:subir 12s infinite linear;

}

@keyframes subir{

0%{
transform:translateY(0);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-110vh);
opacity:0;
}

}

/* caixa do jogo */

#jogo{

background:rgba(20,22,45,0.8);
backdrop-filter:blur(10px);
padding:30px;
border-radius:20px;
width:90%;
max-width:500px;
box-shadow:0 0 40px rgba(0,0,0,0.5);
text-align:center;
animation:aparecer 0.6s;

}

@keyframes aparecer{

from{
opacity:0;
transform:scale(0.9);
}

to{
opacity:1;
transform:scale(1);
}

}

#texto{

font-size:20px;
margin-bottom:25px;
line-height:1.4;

}

button{

display:block;
width:100%;
margin:10px 0;
padding:12px;
border:none;
border-radius:12px;
background:#6b7cff;
color:white;
font-size:16px;
cursor:pointer;
transition:0.2s;

}

button:hover{

transform:scale(1.05);
background:#8896ff;

}

iframe{

margin-top:15px;
border-radius:12px;
border:none;

}

</style>

</head>

<body>

<div class="fundo" id="fundo"></div>

<div id="jogo">

<div id="texto"></div>

<div id="opcoes"></div>

</div>

<script>

/* criar bolhas animadas */

const fundo=document.getElementById("fundo")

for(let i=0;i<30;i++){

const b=document.createElement("div")

b.className="bolha"

b.style.left=Math.random()*100+"%"
b.style.animationDuration=(8+Math.random()*10)+"s"
b.style.width=(10+Math.random()*25)+"px"
b.style.height=b.style.width

fundo.appendChild(b)

}

/* historia */

const historia={

inicio:{
texto:"Aoba Sneijder. Fiz esse pequeno joguinho meio aleatório. Só vai clicando nas coisas e vê onde isso vai parar.",
opcoes:[
{texto:"Bora",destino:"p1"},
{texto:"Ok então",destino:"p1"}
]
},

p1:{
texto:"Primeira pergunta: você prefere dia ou noite?",
opcoes:[
{texto:"Dia",destino:"dia"},
{texto:"Noite",destino:"noite"}
]
},

dia:{
texto:"Dia tem uma energia estranha. Parece que o mundo inteiro tá acordando junto.",
opcoes:[
{texto:"Continuar",destino:"p2"}
]
},

noite:{
texto:"A noite é silenciosa. Dá pra pensar em muita coisa.",
opcoes:[
{texto:"Continuar",destino:"p2"}
]
},

p2:{
texto:"Agora algo aleatório: você prefere praia, montanha ou floresta?",
opcoes:[
{texto:"Praia",destino:"praia"},
{texto:"Montanha",destino:"montanha"},
{texto:"Floresta",destino:"floresta"}
]
},

praia:{
texto:"Som das ondas, vento... parece tranquilo.",
opcoes:[
{texto:"Continuar",destino:"p3"}
]
},

montanha:{
texto:"Montanhas têm uma vista absurda.",
opcoes:[
{texto:"Continuar",destino:"p3"}
]
},

floresta:{
texto:"Florestas são misteriosas. Parece que algo sempre está escondido.",
opcoes:[
{texto:"Continuar",destino:"p3"}
]
},

p3:{
texto:"Você prefere falar muito ou observar mais?",
opcoes:[
{texto:"Falar",destino:"fala"},
{texto:"Observar",destino:"obs"}
]
},

fala:{
texto:"Conversar é uma boa forma de entender alguém.",
opcoes:[
{texto:"Continuar",destino:"p4"}
]
},

obs:{
texto:"Observar também diz muito sobre as pessoas.",
opcoes:[
{texto:"Continuar",destino:"p4"}
]
},

p4:{
texto:"Agora uma pergunta importante: gatos ou cachorros?",
opcoes:[
{texto:"Gatos",destino:"gato"},
{texto:"Cachorros",destino:"cachorro"},
{texto:"Os dois",destino:"ambos"}
]
},

gato:{
texto:"Gatos são meio misteriosos.",
opcoes:[
{texto:"Continuar",destino:"p5"}
]
},

cachorro:{
texto:"Cachorros são extremamente leais.",
opcoes:[
{texto:"Continuar",destino:"p5"}
]
},

ambos:{
texto:"Boa resposta.",
opcoes:[
{texto:"Continuar",destino:"p5"}
]
},

p5:{
texto:"Depois de tudo isso... você deve estar pensando qual é o objetivo disso.",
opcoes:[
{texto:"Sim",destino:"curioso"},
{texto:"Talvez",destino:"curioso"}
]
},

curioso:{
texto:"Na real eu só queria fazer algo diferente pra você ver.",
opcoes:[
{texto:"Continuar",destino:"final1"}
]
},

final1:{
texto:"Mas também queria dizer uma coisa simples.",
opcoes:[
{texto:"O que?",destino:"final2"}
]
},

final2:{
texto:"Eu te amo.",
opcoes:[
{texto:"Ver surpresa",destino:"video"}
]
},

video:{
texto:"Aqui está:",
video:true
}

}

let atual="inicio"

function mostrarCena(){

const cena=historia[atual]

document.getElementById("texto").innerText=cena.texto

const opcoesDiv=document.getElementById("opcoes")

opcoesDiv.innerHTML=""

if(cena.video){

opcoesDiv.innerHTML=`
<iframe width="100%" height="280"
src="https://streamable.com/e/wlmj4r"
allowfullscreen>
</iframe>
`

return

}

cena.opcoes.forEach(opcao=>{

const botao=document.createElement("button")

botao.innerText=opcao.texto

botao.onclick=()=>{

atual=opcao.destino
mostrarCena()

}

opcoesDiv.appendChild(botao)

})

}

mostrarCena()

</script>

</body>

</html>
