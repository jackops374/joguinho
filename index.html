<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pra você Sneijder</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#111;
    color:white;
    margin-top:80px;
}

#caixa{
    max-width:400px;
    margin:auto;
}

button{
    padding:12px 20px;
    margin:10px;
    border:none;
    border-radius:8px;
    background:#ff4d6d;
    color:white;
    font-size:16px;
}
</style>
</head>

<body>

<div id="caixa">
<h2 id="texto">Oi Sneijder Araújo... posso te fazer uma pergunta?</h2>

<div id="opcoes">
<button onclick="pergunta2()">Pode</button>
<button onclick="nao()">Não</button>
</div>
</div>

<script>

function pergunta2(){
    document.getElementById("texto").innerText =
    "Você realmente está bem?";

    document.getElementById("opcoes").innerHTML = `
    <button onclick="final()">Sim</button>
    <button onclick="final()">Não</button>
    `;
}

function nao(){
    document.getElementById("texto").innerText =
    "Por isso eu sempre digo, fale comigo sempre que quiser... Eu gosto de tua presença e sempre te escuto, mesmo que cague pra isso.";

    document.getElementById("opcoes").innerHTML =
    `<button onclick="final()">Continuar</button>`;
}

function final(){
    document.getElementById("texto").innerText =
    ".Pode sempre ser idiotice, sei que você estranha eu em rarissimas vezes escrever isso. Porém\n\nEu amo você ❤️";

    document.getElementById("opcoes").innerHTML = "";
}

</script>

</body>
</html>
