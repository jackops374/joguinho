<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perguntas aham</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0c1024;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;

}

/* fundo */

#fundo{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
pointer-events:none;

}

/* personagens GIF */

.personagem{

position:absolute;
width:110px;
opacity:0.9;
animation:flutuar 6s ease-in-out infinite;

}

.p1{left:5%; bottom:5%;}
.p2{right:5%; bottom:10%;}
.p3{left:40%; top:5%;}

@keyframes flutuar{

0%{transform:translateY(0px);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0px);}

}

/* caixa principal */

#jogo{

background:rgba(20,22,50,0.85);
backdrop-filter:blur(10px);
padding:30px;
border-radius:20px;
width:90%;
max-width:520px;
box-shadow:0 0 40px rgba(0,0,0,0.6);
text-align:center;

}

/* texto */

#texto{

font-size:20px;
margin-bottom:25px;
line-height:1.4;

}

/* botões */

button{

display:block;
width:100%;
margin:10px 0;
padding:12px;
border:none;
border-radius:12px;
background:#6c7cff;
color:white;
font-size:16px;
cursor:pointer;
transition:0.2s;

}

button:hover{

background:#8c98ff;
transform:scale(1.05);

}

/* vídeo */

iframe{

border:none;
border-radius:12px;
margin-top:15px;

}

</style>

</head>

<body>

<div id="fundo">

<img src="img/chiikawa1.gif" class="personagem p1">
<img src="img/chiikawa2.gif" class="personagem p2">
<img src="img/chiikawa3.gif" class="personagem p3">

</div>

<div id="jogo">

<div id="texto"></div>
<div id="opcoes"></div>

</div>

<script>

/* HISTÓRIA */

const historia={

inicio:{
texto:"Aoba Sneijder. Fiz esse joguinho meio aleatório. Só vai clicando nas coisas.",
opcoes:[
{texto:"Bora",destino:"p1"},
{texto:"Ok então",destino:"p1"}
]
},

p1:{
texto:"Primeira pergunta: você prefere dia ou noite?",
opcoes:[
{texto:"Dia",destino:"dia"},
{texto:"Noite",destino:"noite"}
]
},

dia:{
texto:"O dia tem uma energia interessante. Parece que tudo pode acontecer.",
opcoes:[
{texto:"Continuar",destino:"p2"}
]
},

noite:{
texto:"A noite é mais silenciosa. Dá pra pensar em muita coisa.",
opcoes:[
{texto:"Continuar",destino:"p2"}
]
},

p2:{
texto:"Você prefere explorar lugares ou ficar em casa tranquilo?",
opcoes:[
{texto:"Explorar",destino:"explorar"},
{texto:"Casa",destino:"casa"}
]
},

explorar:{
texto:"Explorar sempre traz histórias novas.",
opcoes:[
{texto:"Continuar",destino:"p3"}
]
},

casa:{
texto:"Às vezes ficar em casa é perfeito.",
opcoes:[
{texto:"Continuar",destino:"p3"}
]
},

p3:{
texto:"Agora algo aleatório: gatos ou cachorros?",
opcoes:[
{texto:"Gatos",destino:"gato"},
{texto:"Cachorros",destino:"cachorro"},
{texto:"Os dois",destino:"ambos"}
]
},

gato:{
texto:"Gatos são meio caóticos mas legais.",
opcoes:[
{texto:"Continuar",destino:"p4"}
]
},

cachorro:{
texto:"Cachorros são extremamente companheiros.",
opcoes:[
{texto:"Continuar",destino:"p4"}
]
},

ambos:{
texto:"Boa escolha.",
opcoes:[
{texto:"Continuar",destino:"p4"}
]
},

p4:{
texto:"Depois de tantas perguntas... você deve estar curioso.",
opcoes:[
{texto:"Sim",destino:"curioso"},
{texto:"Talvez",destino:"curioso"}
]
},

curioso:{
texto:"Na verdade eu só queria fazer algo divertido pra você.",
opcoes:[
{texto:"Continuar",destino:"final1"}
]
},

final1:{
texto:"Mas também queria dizer uma coisa simples.",
opcoes:[
{texto:"O que?",destino:"final2"}
]
},

final2:{
texto:"Eu te amo.",
opcoes:[
{texto:"Ver surpresa",destino:"video"}
]
},

video:{
texto:"Aqui está:",
video:true
}

}

/* MOTOR */

let atual="inicio"

function mostrarCena(){

const cena=historia[atual]

document.getElementById("texto").innerText=cena.texto

const opcoesDiv=document.getElementById("opcoes")
opcoesDiv.innerHTML=""

if(cena.video){

opcoesDiv.innerHTML=`
<iframe width="100%" height="280"
src="https://streamable.com/e/wlmj4r"
allowfullscreen>
</iframe>
`

return
}

cena.opcoes.forEach(opcao=>{

const botao=document.createElement("button")

botao.innerText=opcao.texto

botao.onclick=()=>{

atual=opcao.destino
mostrarCena()

}

opcoesDiv.appendChild(botao)

})

}

mostrarCena()

</script>

</body>
</html>
