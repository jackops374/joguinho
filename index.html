<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Perguntas</title>

<style>

body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

/* ESTRELAS */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* CAIXA */

#caixa{

max-width:700px;
margin:auto;
margin-top:120px;

background:rgba(0,0,0,0.6);
padding:30px;

border-radius:15px;
backdrop-filter:blur(10px);

}

/* TEXTO */

#texto{

font-size:22px;
min-height:120px;

}

/* BOTÕES */

button{

padding:12px 20px;
margin:8px;

border:none;
border-radius:10px;

background:#ff4d6d;
color:white;

font-size:16px;

cursor:pointer;
transition:0.3s;

}

button:hover{

transform:scale(1.1);
background:#ff3355;

}

/* VIDEO */

#video{
display:none;
margin-top:20px;
}

video{
max-width:100%;
border-radius:10px;
}

</style>

</head>

<body>

<canvas id="stars"></canvas>

<div id="caixa">

<h2 id="texto"></h2>

<div id="opcoes"></div>

<div id="video">

<video controls>

<source src="KaijuudeOhio.mp4" type="KaijuudeOhio.mp4">

</video>

</div>

</div>

<script>

/* FUNDO ESTRELAS */

const canvas=document.getElementById("stars")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let estrelas=[]

for(let i=0;i<150;i++){

estrelas.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
v:Math.random()*0.4

})

}

function animar(){

ctx.clearRect(0,0,canvas.width,canvas.height)

estrelas.forEach(e=>{

ctx.beginPath()
ctx.arc(e.x,e.y,e.r,0,Math.PI*2)
ctx.fillStyle="white"
ctx.fill()

e.y+=e.v

if(e.y>canvas.height){

e.y=0
e.x=Math.random()*canvas.width

}

})

requestAnimationFrame(animar)

}

animar()

/* TEXTO DIGITANDO */

function digitar(texto){

let i=0

document.getElementById("texto").innerHTML=""

let intervalo=setInterval(()=>{

document.getElementById("texto").innerHTML+=texto[i]

i++

if(i>=texto.length){

clearInterval(intervalo)

}

},30)

}

/* HISTÓRIA */

const historia={

inicio:{
texto:"Oi... posso te fazer algumas perguntas?",
opcoes:[
{texto:"Claro",destino:"p1"},
{texto:"Depende",destino:"p1b"}
]
},

p1b:{
texto:"Prometo que não vai ser estranho.",
opcoes:[
{texto:"Ok",destino:"p1"},
{texto:"Estou curioso",destino:"p1"}
]
},

p1:{
texto:"Você gosta de conversas aleatórias?",
opcoes:[
{texto:"Sim",destino:"p2"},
{texto:"Não muito",destino:"p2b"}
]
},

p2:{
texto:"Então vamos ver até onde você chega.",
opcoes:[
{texto:"Continuar",destino:"p3"}
]
},

p2b:{
texto:"Mesmo assim você chegou até aqui.",
opcoes:[
{texto:"Continuar",destino:"p3"}
]
},

p3:{
texto:"Você prefere conversar ou escutar?",
opcoes:[
{texto:"Conversar",destino:"p4"},
{texto:"Escutar",destino:"p4b"}
]
},

p4:{
texto:"Então você deve ter muitas histórias.",
opcoes:[
{texto:"Continuar",destino:"p5"}
]
},

p4b:{
texto:"Quem escuta aprende mais.",
opcoes:[
{texto:"Continuar",destino:"p5"}
]
},

p5:{
texto:"Você acha que pequenas coisas podem alegrar alguém?",
opcoes:[
{texto:"Sim",destino:"p6"},
{texto:"Talvez",destino:"p6b"}
]
},

p6:{
texto:"Eu também penso assim.",
opcoes:[
{texto:"Continuar",destino:"p7"}
]
},

p6b:{
texto:"Às vezes até um pequeno gesto muda um dia inteiro.",
opcoes:[
{texto:"Continuar",destino:"p7"}
]
},

p7:{
texto:"Agora estamos chegando perto do final.",
opcoes:[
{texto:"Ok",destino:"p8"}
]
},

p8:{
texto:"Mas antes eu preciso dizer uma coisa.",
opcoes:[
{texto:"O que?",destino:"p9"}
]
},

p9:{
texto:"Obrigado por responder todas essas perguntas.",
opcoes:[
{texto:"De nada",destino:"p10"},
{texto:"Sem problema",destino:"p10"}
]
},

p10:{
texto:"Talvez tudo isso tenha sido por um motivo simples.",
opcoes:[
{texto:"Qual?",destino:"final"}
]
},

final:{
texto:"Porque às vezes é difícil dizer algo diretamente.",
opcoes:[
{texto:"Continuar",destino:"final2"}
]
},

final2:{

opcoes:[
{texto:"...",destino:"final3"}
]
},

final3:{
texto:"Talvez seja mais fácil dizer agora.",
opcoes:[
{texto:"Ok",destino:"final4"}
]
},

final4:{
texto:"Então aqui vai uma coisa simples.",
opcoes:[
{texto:"...",destino:"final5"}
]
},

final5:{
texto:"Eu te amo.",
opcoes:[
{texto:"Ver surpresa",destino:"video"}
]
},

video:{
texto:"Agora um pequeno vídeo.",
opcoes:[]
}

}

let atual="inicio"

function mostrarCena(){

const cena=historia[atual]

digitar(cena.texto)

let html=""

cena.opcoes.forEach(op=>{

html+=`<button onclick="escolher('${op.destino}')">${op.texto}</button>`

})

document.getElementById("opcoes").innerHTML=html

if(atual==="video"){

document.getElementById("video").style.display="block"

}

}

function escolher(destino){

atual=destino

mostrarCena()

}

mostrarCena()

</script>

</body>
</html>
