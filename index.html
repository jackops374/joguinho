<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Perguntas</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
overflow:hidden;
}

/* FUNDO */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:linear-gradient(45deg,#ff7eb3,#ff758c,#7afcff,#ffd166);
background-size:400% 400%;
animation:fundo 18s infinite;
z-index:-1;
}

@keyframes fundo{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* CAIXA */

#caixa{
max-width:700px;
margin:auto;
margin-top:120px;
background:rgba(0,0,0,0.55);
padding:30px;
border-radius:15px;
backdrop-filter:blur(10px);
}

/* TEXTO */

#texto{
font-size:22px;
min-height:80px;
transition:opacity 0.4s;
}

/* BOTÕES */

button{
padding:12px 20px;
margin:8px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
background:#ff3355;
}

/* VIDEO */

#video{
display:none;
margin-top:25px;
}

</style>

</head>

<body>

<div id="caixa">

<h2 id="texto"></h2>

<div id="opcoes"></div>

<div id="video">

<iframe width="560" height="315"
src="https://youtu.be/xsHf1lhB0B8?si=n_n1R8v--rzMd83u"
frameborder="0"
allowfullscreen>
</iframe>

</div>

</div>

<script>

const historia = {

{texto:"Claro",destino:"p1"},

},

p1b:{
texto:"Prometo que não vai ser estranho.",

{texto:"Ok então",destino:"p1"},

},

p1:{

{texto:"Sim",destino:"p2"},

p2:{
texto:"Ótimo. Então vamos continuar.",
opcoes:[
{texto:"Continuar",destino:"p3"},
{texto:"Ok",destino:"p3"}
]
},

p2b:{
texto:"Tudo bem. Vou tentar não exagerar.",
opcoes:[
{texto:"Pode continuar",destino:"p3"},
{texto:"Vamos ver",destino:"p3"}
]
},

p3:{
texto:"Você prefere conversar ou ouvir?",
opcoes:[

p4:{
texto:"Então você deve ter muitas histórias.",

p4b:{

{texto:"Verdade",destino:"p5"},

p4c:{

{texto:"Continuar",destino:"p5"},

{texto:"Manhã",destino:"p6"},

opcoes:[
{texto:"Sim",destino:"p8"},
{texto:"Talvez",destino:"p8b"},
{texto:"Não sei",destino:"p8c"}
]
},

p8:{
texto:"Eu também acho isso.",
opcoes:[
{texto:"Continuar",destino:"p9"}
]
},

p8b:{
texto:"Talvez seja exatamente assim que algumas começam.",
opcoes:[
{texto:"Interessante",destino:"p9"}
]
},

p8c:{
texto:"Às vezes percebemos isso depois.",
opcoes:[
{texto:"Pode ser",destino:"p9"}

p9:{
texto:"Agora uma pergunta diferente.",

{texto:"Qual?",destino:"p10"},
{texto:"Ok",destino:"p10"}
]
},

p10:{
texto:"Se alguém estivesse pensando em você agora, o que acharia?",
opcoes:[
{texto:"Legal",destino:"p11"},

]
},

p11:{
texto:"Isso é uma reação boa.",

{texto:"Continuar",destino:"p12"}
]
},

p11b:{
texto:"Curiosidade pode levar a boas descobertas.",
opcoes:[
{texto:"Continuar",destino:"p12"}
]
},

p11c:{
texto:"Talvez inesperado seja a palavra certa.",
opcoes:[
{texto:"Continuar",destino:"p12"}
]
},

p12:{
texto:"Você gosta de jogos?",

{texto:"Sim",destino:"p13"},

},

p13:{
texto:"Então talvez você esteja gostando desse.",
opcoes:[
{texto:"Continuar",destino:"p14"}
]
},

p13b:{
texto:"Mesmo assim você chegou até aqui.",

{texto:"Continuar",destino:"p14"}

p14:{
texto:"Agora uma pergunta simples.",

]
},

p15:{

p16:{

{texto:"Continuar",destino:"p17"}
]
},

p16b:{
texto:"Mesmo pequenas coisas podem ter impacto.",
opcoes:[
{texto:"Continuar",destino:"p17"}
]
},

p17:{
texto:"Agora estamos chegando perto do final.",
opcoes:[
{texto:"Ok",destino:"p18"}
]
},

p18:{
texto:"Mas antes disso...",
opcoes:[
{texto:"Continuar",destino:"p19"}
]
},

p19:{
texto:"Obrigado por responder todas essas perguntas.",
opcoes:[
{texto:"Sem problema",destino:"p20"},
{texto:"De nada",destino:"p20"}
]
},

p20:{
texto:"Talvez tudo isso tenha sido por um motivo simples.",
opcoes:[
{texto:"Qual?",destino:"final1"},
{texto:"Estou curioso",destino:"final1"}
]
},

final1:{
texto:"Porque às vezes é difícil dizer algo diretamente.",
opcoes:[
{texto:"Continuar",destino:"final2"}
]
},

final2:{
texto:"Mas depois de tantas perguntas...",
opcoes:[
{texto:"Continuar",destino:"final3"}
]
},

final3:{
texto:"Talvez seja mais fácil dizer agora.",
opcoes:[
{texto:"Ok",destino:"final4"}
]
},

final4:{
texto:"Então aqui vai uma coisa simples...",
opcoes:[
{texto:"...",destino:"final5"}
]
},

final5:{
texto:"Eu te amo.",
opcoes:[
{texto:"Ver surpresa",destino:"video"}
]
},

video:{
texto:"Obrigado por jogar até o final.",
opcoes:[]
}

}

let atual="inicio"

function mostrarCena(){

const cena = historia[atual]

document.getElementById("texto").style.opacity=0

setTimeout(()=>{
document.getElementById("texto").innerText=cena.texto
document.getElementById("texto").style.opacity=1
},250)

let html=""

cena.opcoes.forEach(op=>{
html+=`<button onclick="escolher('${op.destino}')">${op.texto}</button>`
})

document.getElementById("opcoes").innerHTML=html

if(atual==="video"){
document.getElementById("video").style.display="block"
}

}

function escolher(destino){

atual=destino

mostrarCena()

}

mostrarCena()

</script>

</body>
</html>
