<style>

/* RESET */

body{
margin:0;
background:#0b0b0b;
font-family:Arial;
color:white;
text-align:center;
overflow:hidden;
}

/* FUNDO ESTRELAS */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* CAIXA */

#caixa{

max-width:700px;
margin:auto;
margin-top:100px;

background:rgba(0,0,0,0.65);

padding:30px;

border-radius:15px;

backdrop-filter:blur(10px);

}

/* TEXTO */

#texto{

font-size:22px;

min-height:120px;

line-height:1.5;

}

/* BOTÕES */

button{

padding:12px 20px;

margin:8px;

border:none;

border-radius:10px;

background:#ff4d6d;

color:white;

font-size:16px;

cursor:pointer;

transition:0.25s;

}

button:hover{

transform:scale(1.08);

background:#ff3355;

}

/* VIDEO */

#video{

display:none;

margin-top:20px;

}

video{

max-width:100%;

border-radius:12px;

}

</style>

</head>

<body>

<canvas id="stars"></canvas>

<div id="caixa">

<h2 id="texto"></h2>

/* ===== FUNDO DE ESTRELAS ===== */

const canvas = document.getElementById("stars")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let estrelas = []

for(let i=0;i<160;i++){

estrelas.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
v:Math.random()*0.5

})

}

function animar(){

ctx.clearRect(0,0,canvas.width,canvas.height)

estrelas.forEach(e=>{

ctx.beginPath()

ctx.arc(e.x,e.y,e.r,0,Math.PI*2)

ctx.fillStyle="white"

ctx.fill()

e.y += e.v

if(e.y>canvas.height){

e.y = 0
e.x = Math.random()*canvas.width

}

})

requestAnimationFrame(animar)

}

animar()

/* ===== TEXTO DIGITANDO ===== */

function digitar(texto){

let i = 0

document.getElementById("texto").innerHTML = ""

let intervalo = setInterval(()=>{

document.getElementById("texto").innerHTML += texto[i]

i++

if(i >= texto.length){

clearInterval(intervalo)

}

},25)

}

/* ===== MOTOR DO JOGO ===== */

let atual = "inicio"

function mostrarCena(){

const cena = historia[atual]

digitar(cena.texto)

let html = ""

cena.opcoes.forEach(op=>{

html += `<button onclick="escolher('${op.destino}')">${op.texto}</button>`

})

document.getElementById("opcoes").innerHTML = html

if(atual === "video"){

document.getElementById("video").style.display = "block"

}

}

function escolher(destino){

atual = destino

mostrarCena()
